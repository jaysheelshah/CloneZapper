# ── Test Database (temp file per test run) ───────────────────────────────────
spring.datasource.url=jdbc:sqlite:file::memory:?cache=shared
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ── Disable Vaadin in tests ───────────────────────────────────────────────────
spring.main.web-application-type=none
spring.autoconfigure.exclude=com.vaadin.flow.spring.SpringBootAutoConfiguration

# ── Disable devtools in tests (prevents devtools from forcing web context) ────
spring.devtools.restart.enabled=false

# ── Suppress SQLite JDBC cleanup noise (C:\WINDOWS\TEMP access denied) ───────
logging.level.org.sqlite.SQLiteJDBCLoader=OFF
