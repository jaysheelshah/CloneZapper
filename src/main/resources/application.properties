# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:sqlite:clonezapper.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Run schema.sql on startup (CREATE TABLE IF NOT EXISTS — safe to repeat)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# ── Archive ───────────────────────────────────────────────────────────────────
clonezapper.archive.root=${user.home}/CloneZapperArchive

# ── Vaadin ────────────────────────────────────────────────────────────────────
# Do not auto-open browser on startup
vaadin.launch-browser=false

# ── Desktop (folder picker) ───────────────────────────────────────────────────
# Allow AWT/Swing components (JFileChooser). Spring Boot defaults to headless=true
# which breaks the OS folder picker on a local desktop install.
spring.main.headless=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.clonezapper=INFO
logging.level.org.sqlite.SQLiteJDBCLoader=OFF
